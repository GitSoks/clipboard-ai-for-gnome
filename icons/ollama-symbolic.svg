<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Local AI server / home workstation icon -->
  <!-- Main tower body -->
  <rect x="4" y="1.5" width="8" height="13" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
  <!-- Screen / display area -->
  <rect x="5.5" y="3" width="5" height="4" rx="0.8" fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- Neural node / AI brain on screen -->
  <circle cx="8" cy="5" r="1" fill="currentColor"/>
  <circle cx="6.5" cy="5.8" r="0.5" fill="currentColor" opacity="0.6"/>
  <circle cx="9.5" cy="5.8" r="0.5" fill="currentColor" opacity="0.6"/>
  <line x1="8" y1="5" x2="6.5" y2="5.8" stroke="currentColor" stroke-width="0.4" opacity="0.5"/>
  <line x1="8" y1="5" x2="9.5" y2="5.8" stroke="currentColor" stroke-width="0.4" opacity="0.5"/>
  <!-- Drive bays / status LEDs below -->
  <circle cx="6" cy="9" r="0.6" fill="currentColor" opacity="0.7"/>
  <circle cx="8" cy="9" r="0.6" fill="currentColor" opacity="0.4"/>
  <circle cx="10" cy="9" r="0.6" fill="currentColor" opacity="0.4"/>
  <!-- Power button -->
  <circle cx="8" cy="11.5" r="0.8" fill="none" stroke="currentColor" stroke-width="0.8"/>
  <line x1="8" y1="10.8" x2="8" y2="11.2" stroke="currentColor" stroke-width="0.6"/>
</svg>